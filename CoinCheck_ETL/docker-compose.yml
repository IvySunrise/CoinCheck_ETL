x-airflow-common:
  &airflow-common
  build:
    context: ./containers/airflow/
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKEND: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW_CONN_POSTGRES_DEFAULT: postgres://airflow:airflow@postgres:5432/airflow
  user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-50000}"
  depends_on:
    postgres:
      condition: service_healthy

services:

  postgres:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./containers/upstream:/docker-entrypoint-initdb.d
      - ./data:/input_data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 5s
      retries: 5
    restart: always
    ports:
      - "5432:5432"

  airflow-webserver:
    <<: *airflow-common
    container_name: webserver
    command: webserver
    ports:
      - 8080:8080
    environment:
      <<: *airflow-common-env
      PYTHONPATH: /opt/airflow:/app
    volumes:
      # Airflow system dirs (must remain untouched)
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./temp:/opt/airflow/temp
      - ./data:/opt/airflow/data
      # Project code (outside Airflow internal dirs)
      - ./CoinCheck_ETL:/app/CoinCheck_ETL
      # CSV folder completely outside Airflow dirs
      - /workspaces/beginner_de_project/CoinCheck_ETL/kafka_tutorial:/app/kafka_tutorial
    healthcheck:
      test:
        ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: scheduler
    command: scheduler
    environment:
      <<: *airflow-common-env
      PYTHONPATH: /opt/airflow:/app
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./temp:/opt/airflow/temp
      - ./data:/opt/airflow/data
      - ./CoinCheck_ETL:/app/CoinCheck_ETL
      - /workspaces/beginner_de_project/CoinCheck_ETL/kafka_tutorial:/app/kafka_tutorial
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"'
        ]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db upgrade && \
      airflow users create \
      --username ${_AIRFLOW_WWW_USER_USERNAME:-airflow} \
      --password ${_AIRFLOW_WWW_USER_PASSWORD:-airflow} \
      --firstname Airflow \
      --lastname Admin \
      --role Admin \
      --email airflow@example.com"
    environment:
      <<: *airflow-common-env
    volumes:
      - airflow_logs:/opt/airflow/logs

  minio:
    image: 'minio/minio:latest'
    hostname: minio
    container_name: minio
    ports:
      - '9000:9000'  
      - '9001:9001'
    environment:
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server --console-address ":9001" /data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  broker1:
    image: confluentinc/cp-kafka:7.4.4
    container_name: broker1
    hostname: broker1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      PYTHONPATH: "/app"
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker1:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

  broker2:
    image: confluentinc/cp-kafka:7.4.4
    container_name: broker2
    hostname: broker2
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"
    environment:
      PYTHONPATH: "/app"
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker2:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

  producer:
    build:
      context: ./kafka_tutorial
      dockerfile: Dockerfile.producer
    container_name: producer
    volumes:
      - ./kafka_tutorial/trades.csv:/app/trades.csv
      - ./kafka_tutorial/wait-for-kafka.sh:/app/wait-for-kafka.sh
      - ./data:/opt/airflow/data
    environment:
      PYTHONPATH: "/app"
      KAFKA_BOOTSTRAP_SERVERS: "broker1:9092,broker2:9092"
      COINCHECK_API_KEY: ${COINCHECK_API_KEY}
      COINCHECK_API_SECRET: ${COINCHECK_API_SECRET}
    command: 
      bash -c "python -u /app/public_producer.py && while true; do sleep 1000; done"
    depends_on:
      - broker1
      - broker2
    dns:
      - 8.8.8.8
      - 1.1.1.1

  consumer:
    build:
      context: ./kafka_tutorial
      dockerfile: Dockerfile.consumer
    container_name: consumer
    depends_on:
      - broker1
      - broker2
    environment:
      PYTHONPATH: "/app"
      KAFKA_BOOTSTRAP_SERVERS: "broker1:9092,broker2:9092"
      COINCHECK_API_KEY: ${COINCHECK_API_KEY}
      COINCHECK_API_SECRET: ${COINCHECK_API_SECRET}
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  airflow_logs:
